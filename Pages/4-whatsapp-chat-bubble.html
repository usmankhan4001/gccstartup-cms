<script>
(function(){
  var CMS = 'https://cms.gccstartup.com';
  var PAGE = window.location.href;
  var fbclid = new URLSearchParams(window.location.search).get('fbclid') || '';
  var opened = false;

  setTimeout(function(){
    var t = document.getElementById('gccTooltip');
    if (t) t.style.display = 'block';
  }, 3000);

  if (!sessionStorage.getItem('gcc_chat_seen')) {
    setTimeout(function(){
      if (!opened) gccChatOpen();
    }, 8000);
  }

  function gccChatOpen(){
    opened = true;
    sessionStorage.setItem('gcc_chat_seen', '1');
    document.getElementById('gccChat').classList.add('open');
    document.getElementById('gccTooltip').style.display = 'none';
    setTimeout(function(){
      document.getElementById('gccTyping').classList.remove('show');
      document.getElementById('gccMsg1').classList.add('show');
    }, 1200);
    setTimeout(function(){
      document.getElementById('gccMsg2').classList.add('show');
      var b = document.getElementById('gccChatBody');
      b.scrollTop = b.scrollHeight;
    }, 2200);
  }

  function gccChatClose(){
    document.getElementById('gccChat').classList.remove('open');
    opened = false;
  }

  function gccChatToggle(){
    if (document.getElementById('gccChat').classList.contains('open')) gccChatClose();
    else gccChatOpen();
  }

  function gccShowFields(){
    document.getElementById('gccReplyHint').style.display = 'none';
    document.getElementById('gccFields').classList.add('show');
    document.getElementById('gcName').focus();
  }

  window.gccChatOpen   = gccChatOpen;
  window.gccChatClose  = gccChatClose;
  window.gccChatToggle = gccChatToggle;
  window.gccShowFields = gccShowFields;

  window.gccChatSubmit = function(){
    var name  = document.getElementById('gcName').value.trim();
    var phone = document.getElementById('gcPhone').value.trim();
    if (!name || !phone) { alert('Please enter your name and WhatsApp number.'); return; }
    var btn = document.getElementById('gcSend');
    btn.disabled = true; btn.textContent = 'Connecting…';
    var eventId = 'bubble-' + Date.now();
    if (window.fbq) fbq('track', 'Lead', { content_name: 'WhatsApp Bubble' }, { eventID: eventId });
    fetch(CMS + '/api/lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: name, phone: phone,
        interest: 'WhatsApp Chat',
        source: 'Chat Bubble', page: PAGE,
        fbclid: fbclid, eventId: eventId
      })
    }).finally(function(){
      window.open(
        'https://wa.me/447868762416?text=' + encodeURIComponent('Hi GCCStartup! I\'d like to know the best jurisdiction for my business. My name is ' + name + '.'),
        '_blank'
      );
      var body = document.getElementById('gccChatBody');
      var done = document.createElement('div');
      done.className = 'gcc-chat__msg show';
      done.innerHTML = 'Perfect ' + name.split(' ')[0] + '! 🎉 Opening WhatsApp now — I\'ll be there in a moment.<div class="gcc-chat__msg-time">Just now</div>';
      body.appendChild(done);
      body.scrollTop = body.scrollHeight;
      document.getElementById('gccFields').style.display = 'none';
    });
  };
})();
</script>
